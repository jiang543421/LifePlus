server:
    port: 8080
    forward-headers-strategy: native
spring:
    application:
        name: lifepulse
    datasource:
        url: ${LP_DB_URL:jdbc:mysql://localhost:3306/lifepulse?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
        username: ${LP_DB_USER:lp}
        password: ${LP_DB_PASS:lp_dev_only}
        driver-class-name: com.mysql.cj.jdbc.Driver
    flyway:
        enabled: true
        baseline-on-migrate: true
        locations: classpath:db/migration
    data:
        redis:
            url: ${LP_REDIS_URL:redis://localhost:6379}
            timeout: 2s
mybatis-plus:
    global-config:
        db-config:
            logic-delete-field: deleted
            logic-delete-value: 1
            logic-not-delete-value: 0
lp:
    jwt:
        secret: ${LP_JWT_SECRET:dev-only-secret-replace-me-32bytes-xxx}
        access-ttl: PT1H
        refresh-ttl: P7D
    cors:
        # CORS 跨域白名单（issue R-004）。
        # 默认 http://localhost 适配 docker compose 前端 80 端口；dev 用 5173 需覆盖。
        # prod 必须显式注入 LP_CORS_ORIGINS；禁 * / 空（启动 fail-fast）。
        allowed-origins: ${LP_CORS_ORIGINS:http://localhost}
management:
    endpoints:
        web:
            exposure:
                include: health,info
logging:
    pattern:
        console: "%d{HH:mm:ss.SSS} [%thread] %-5level %X{traceId:-} %logger{36} - %msg%n"
