server:
    port: 8080
    forward-headers-strategy: native
spring:
    application:
        name: lifepulse
    datasource:
        url: ${LP_DB_URL:jdbc:mysql://localhost:3306/lifepulse?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
        username: ${LP_DB_USER:lp}
        password: ${LP_DB_PASS:lp_dev_only}
        driver-class-name: com.mysql.cj.jdbc.Driver
    flyway:
        enabled: true
        baseline-on-migrate: true
        locations: classpath:db/migration
    data:
        redis:
            url: ${LP_REDIS_URL:redis://localhost:6379}
            timeout: 2s
mybatis-plus:
    global-config:
        db-config:
            logic-delete-field: deleted
            logic-delete-value: 1
            logic-not-delete-value: 0
lp:
    jwt:
        secret: ${LP_JWT_SECRET:dev-only-secret-replace-me-32bytes-xxx}
        # Access TTL 缩短到 15min（issue 2026-07-18 HIGH-2 决策，关闭 deny-list）。
        # 改密 / 注销后旧 token 最长额外有效 15min；配合 refresh 旋转（7d）与前端
        # 改密成功立即 clear()，盗用风险窗口与可用性 trade-off 接受。
        access-ttl: PT15M
        refresh-ttl: P7D
    cors:
        # CORS 跨域白名单（issue R-004）。
        # 默认 http://localhost 适配 docker compose 前端 80 端口；dev 用 5173 需覆盖。
        # prod 必须显式注入 LP_CORS_ORIGINS；禁 * / 空（启动 fail-fast）。
        allowed-origins: ${LP_CORS_ORIGINS:http://localhost}
    # AI 分析模块（spec §7.1）
    # 4 个 enabled=true 用 Java 默认值；daily-enabled 默认 false（v2.0 stub）
    # 可经 LP_AI_DAILY_ENABLED=true 在 prod 灰度开启（v2.1+ 启用 daily provider）
    # 避免 v1.2.3 合并前误用日报表导致 SQL 错误
    ai:
        daily-enabled: ${LP_AI_DAILY_ENABLED:false}
management:
    endpoints:
        web:
            exposure:
                include: health,info
logging:
    pattern:
        console: "%d{HH:mm:ss.SSS} [%thread] %-5level %X{traceId:-} %logger{36} - %msg%n"
