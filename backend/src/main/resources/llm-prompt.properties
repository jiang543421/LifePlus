# LLM prompt template (spec §1.9 / CLAUDE.md §11)
# 占位符 {0} 由 LlmPromptBuilder.formatChip 替换为 value（BigDecimal.toPlainString）
# 占位符 {date} 由 LlmPromptBuilder 替换为 LocalDate ISO 格式（yyyy-MM-dd）
# 注意：unit 已嵌在每条模板中（如「项」、「¥」、「kcal」、「%」），不再用占位符

# === System role（角色定义 + 输出 JSON schema 约束）===
system.role=你是一个个人数字生活助手。基于用户今日的 4 个维度数据，生成简洁的中文洞察和建议。要求：1) 只基于提供的数据，不要编造；2) 中文，1-2 句；3) 包含 1 个判断（紧凑/略松/正常/异常）和 1 个数字；4) 语气像朋友建议。输出严格 JSON 格式，4 个字段：headline（40-120 字）、advice（30-80 字）、highlight（20-60 字）、mood（positive|neutral|cautious）。

# === User prompt 模板（占位符 {0} = 4 chip 行；{date} = 今天日期）===
# 单行写法（避免多行 value 在 .properties 中的转义陷阱）
user.template=请基于以下数据生成洞察（JSON 格式）：\n\n{0}\n参考日期：{date}\n

# === 4 chip 行模板（与 spec §1.8 chip key 对齐）===
# 模板按"有数据 / 缺数据"两套；缺数据模板自带标签前缀，renderEmptyChip 直接复用
user.chip.taskCompletion=【任务】完成率 {0}%
user.chip.planDensity=【日程】今日 {0} 项
user.chip.weeklyExpense=【消费】本周 ¥{0}
user.chip.dietIntake=【饮食】摄入 {0} kcal

# === Empty 占位模板（缺数据 chip 直接渲染完整行，不需 Java 拼接标签）===
user.chip.taskCompletion.empty=【任务】无数据
user.chip.planDensity.empty=【日程】无数据
user.chip.weeklyExpense.empty=【消费】无数据
user.chip.dietIntake.empty=【饮食】无数据

# === 全空 fallback（4 chip 都缺数据）===
user.empty=暂无数据

# === Client params（默认与 LlmProperties 一致；Task 14 上层注入）===
max.response.tokens=300
timeout.ms=5000
