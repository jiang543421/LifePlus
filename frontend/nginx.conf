server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # === 安全响应头（issue R-004 / CLAUDE.md §7.5）===
    # default-src 'self'：所有资源默认同源
    # script-src 'self'：禁止 inline + 第三方 JS（Vite 产物已无 inline script）
    # style-src 'self' 'unsafe-inline'：Element Plus 运行时插入 <style>，需 unsafe-inline
    #   ⚠ unsafe-inline 消除窗口：Element Plus 升级到用 nonce 时移除
    # connect-src 'self' <API>：允许向后端 API 跨域 XHR（${LP_API_ORIGIN} 注入具体域名）
    # img-src 'self' data:：data: 给 inline SVG（图标）
    # frame-ancestors 'none'：禁 iframe 嵌套（防 clickjacking）
    # base-uri 'self'：禁 <base> 注入
    # form-action 'self'：禁表单跨域提交
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ${LP_API_ORIGIN}; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS 仅 HTTPS 部署时启用；HTTP 环境（HSTS preload 列表前 6 个月内）暂不上 preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Trace-Id $request_id;
    }
}