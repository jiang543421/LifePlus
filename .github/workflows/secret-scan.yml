name: secret-scan

# Phase 5 backlog item：CI 端镜像本地 .githooks/pre-commit 的 gitleaks 拦截。
# PR4（v2.1.0-ai）落地了本地 pre-commit，本 workflow 是最后一道线。
#
# 触发策略：
#   - push 到 main（防 backend team 直接 push 漏拦截）
#   - pull_request（任何 PR，必须绿才能合；与 CLAUDE.md §5.3 PR 与合并流程 对齐）
#   - workflow_dispatch（手动复测或定期 sweep）
#
# 为什么用 `detect --no-git` 而非 `protect --staged`：
#   - CI 没有"staged"概念；`detect --source .` 扫整个 working copy；
#   - `protect --staged` 也可在 CI 用，但需要先把变更放到 working tree，
#     CI 默认 checkout 已包含 PR diff，等价于 protect；
#   - 选择 detect 是因为它更通用，且与本地语义最接近（拦截一切命中规则）。
#
# 与 .gitleaks.toml 的关系：完全共用同一份规则；allowlist 也复用
# （.env.example / docs/ / .superpowers/ / 后端测试代码）。
#
# 与 pre-commit 的责任划分：
#   - 本地 pre-commit 拦截 staged diff（开发者提交前最后拦截）
#   - CI 拦截 whole tree（合并前最后一道线）
#   - 任一命中 → 阻断。两个都装 = 双保险。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: gitleaks detect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go (gitleaks 依赖)
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install gitleaks ${{ vars.GITLEAKS_VERSION || '8.18.4' }}
        env:
          VERSION: ${{ vars.GITLEAKS_VERSION || '8.18.4' }}
        run: |
          set -euo pipefail
          URL="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_amd64.tar.gz"
          echo "[gitleaks] downloading ${URL}"
          curl -sSfL -o /tmp/gitleaks.tgz "${URL}"
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          rm -f /tmp/gitleaks /tmp/gitleaks.tgz
          gitleaks version

      - name: Detect secrets in working tree (with .gitleaks.toml rules)
        run: |
          set -euo pipefail
          # --no-git: 不依赖 git 历史，只扫 working copy（CI 友好）
          # --source .: 扫仓库根（与本地 pre-commit 等价范围）
          # --config .gitleaks.toml: 复用与本地一致的规则与 allowlist
          # --redact: 命中规则时打印 [REDACTED] 而非原文，避免 CI 日志泄露
          # --verbose: 失败时给 file:line 方便开发者定位
          # --exit-code 1: 任何命中 → workflow fail（与 pre-commit 等价语义）
          gitleaks detect --no-git --source . --config .gitleaks.toml --redact --verbose --exit-code 1
